# ============================================================
#  mall-app-web 商城 H5 前端 Nginx 配置
#
#  【这个文件的作用】
#  商城前端（uni-app H5 版本）的 Nginx 服务器配置。
#  浏览器访问 http://106.53.106.41:8085 时，请求首先到达这个 Nginx。
#
#  【职责分工】
#  1. 静态文件服务：返回前端 HTML/JS/CSS 等文件
#  2. API 反向代理：将 /mall-portal/* 等 API 请求转发给 Gateway
#  3. SPA 路由：Vue Router history 模式需要所有路径返回 index.html
#
#  【请求链路】
#  浏览器 → Nginx(:8085) → Gateway(:8201) → mall-portal / mall-admin / ...
#
#  【部署位置】
#  部署在 tengxun-server (106.53.106.41)，通过 docker-compose 管理。
#  容器名: mall-app-nginx
#  端口映射: 8085:80
#  镜像: mall-swarm-202606:mall-app-web-latest
#
#  【与 mall-admin-web 的区别】
#  mall-admin-web 的 nginx 还有一个 /admin/ → /mall-admin/ 的路径重写规则，
#  因为后台前端的代码中有直接调用 /admin/login 的旧写法。
#  mall-app-web 不需要这个重写，所有 API 都走 /mall-portal/* 前缀。
#
#  【与 docker/nginx/nginx.conf 的区别】
#  docker/nginx/nginx.conf 是一个通用的 API 代理配置（rate-limit + catch-all），
#  但不提供静态文件服务。本文件是前端专用的，既服务静态文件又代理 API。
# ============================================================

# Nginx 工作进程数，auto 表示自动检测 CPU 核心数
worker_processes auto;

events {
    # 每个 worker 进程最多同时处理 1024 个连接
    worker_connections 1024;
}

http {
    # MIME 类型映射（告诉浏览器 .js 是 application/javascript 等）
    include       mime.types;
    default_type  application/octet-stream;

    # 开启高效文件传输（零拷贝），提升静态文件性能
    sendfile        on;
    # 客户端 keep-alive 超时时间（秒）
    keepalive_timeout 65;

    # ============================================================
    #  Gateway 上游服务器
    #  名字 "gateway" 会被下面的 proxy_pass 引用
    #  地址使用容器名 mall-gateway，Docker 网络自动解析为容器 IP
    #  端口 8201 是 Gateway 的监听端口
    # ============================================================
    upstream gateway {
        server mall-gateway:8201;
    }

    # OSS 图片代理上游
    upstream oss {
        server macro-oss.oss-cn-shenzhen.aliyuncs.com:80;
    }

    server {
        listen       80;
        server_name  _;

        # 前端静态文件根目录（Dockerfile 中 COPY 到这里）
        root   /usr/share/nginx/html;
        index  index.html;

        # ============================================================
        #  API 代理规则
        #
        #  前端代码中 VITE_API_BASE_URL=/mall-portal，
        #  所以浏览器发出的请求形如：http://106.53.106.41:8085/mall-portal/home/content
        #
        #  Nginx 匹配到 /mall-portal/ 前缀后，将整个请求转发给 Gateway。
        #  Gateway 收到 /mall-portal/home/content 后，根据路由规则去掉 /mall-portal 前缀，
        #  转发到 mall-portal 服务的 /home/content。
        #
        #  同理 /mall-admin/ 和 /mall-auth/ 分别转发到对应的后端服务。
        #  这些路径前缀是 Spring Cloud Gateway 的路由标识，不能省略。
        # ============================================================

        # ============================================================
        #  阿里云 OSS 图片反向代理
        #
        #  原作者的商品图片存储在阿里云 OSS（macro-oss.oss-cn-shenzhen.aliyuncs.com），
        #  但 OSS 没有配置 CORS 跨域 headers，浏览器会阻止跨域加载（ERR_BLOCKED_BY_ORB）。
        #
        #  解决方案：通过 Nginx 反向代理，让图片请求走自己的服务器中转。
        #  浏览器请求 /oss/mall/images/xxx.jpg → Nginx 代理到 OSS → 返回图片
        #
        #  同时在 /mall-portal/ 的 sub_filter 中将 API 响应里的 OSS 绝对 URL
        #  重写为 /oss/ 相对路径，这样浏览器就不会直接请求 OSS 域名了。
        # ============================================================
        # ^~ 前缀匹配，优先级高于下面的正则匹配（避免 .png/.jpg 被静态文件规则拦截）
        location ^~ /oss/ {
            proxy_pass http://macro-oss.oss-cn-shenzhen.aliyuncs.com/;
            proxy_set_header Host macro-oss.oss-cn-shenzhen.aliyuncs.com;
            proxy_set_header Referer "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 缓存 OSS 图片（图片内容不变，长期缓存）
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 商城后台管理 API（mall-app-web 中可能用到的管理接口）
        location /mall-admin/ {
            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 认证授权 API（登录、注册、获取验证码等）
        location /mall-auth/ {
            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        #  前台商城 API（最核心的代理规则）
        #  包括：首页内容、商品浏览、购物车、订单、会员等所有 C �端接口
        #
        #  sub_filter 将 API 响应中的 OSS 绝对 URL 重写为 /oss/ 相对路径，
        #  这样浏览器加载图片时会走 Nginx 代理，而不是直接请求 OSS（避免 CORS 问题）。
        # ============================================================
        location /mall-portal/ {
            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 重写 OSS URL：http://macro-oss.oss-cn-shenzhen.aliyuncs.com → /oss
            sub_filter 'http://macro-oss.oss-cn-shenzhen.aliyuncs.com' '/oss';
            sub_filter_once off;
            sub_filter_types application/json text/plain;
        }

        # 搜索服务 API（商品搜索、关键词联想等）
        location /mall-search/ {
            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        #  Vue Router history 模式支持
        #
        #  前端使用 Vue Router 的 history 模式（URL 不带 # 号），
        #  例如 http://106.53.106.41:8085/pages/product/detail?id=1
        #
        #  当用户直接访问这个 URL 或刷新页面时，Nginx 会在服务器上找不到对应的文件，
        #  所以需要 try_files 把请求重定向到 index.html，让前端路由接管。
        #
        #  try_files 的含义：
        #  1. 先尝试 $uri（精确文件，如 /assets/index.js）
        #  2. 再尝试 $uri/（目录，如 /assets/）
        #  3. 都没有就返回 /index.html（SPA 入口）
        # ============================================================
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ============================================================
        #  静态资源缓存策略
        #
        #  JS/CSS/图片等静态文件设置 7 天缓存，减少重复请求。
        #  immutable 标记告诉浏览器：这个文件内容不会变，不需要再验证。
        #  （Vite 构建时会给文件名加 hash，如 index-BU2qGmD6.js，
        #    内容变了 hash 也会变，所以可以安全地设置长期缓存）
        # ============================================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
